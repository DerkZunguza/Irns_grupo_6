<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IoT Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3e;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --orange:    #f97316;
      --orange-dim:#7c3212;
      --blue:      #38bdf8;
      --blue-dim:  #0c4a6e;
      --green:     #22c55e;
      --red:       #ef4444;
      --radius:    12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header h1 span { color: var(--orange); }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.4s;
    }

    .dot.online  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.offline { background: var(--red);   box-shadow: 0 0 6px var(--red); }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .card-value {
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1;
    }

    .card-value.temp  { color: var(--orange); }
    .card-value.hum   { color: var(--blue); }
    .card-value.small {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      word-break: break-all;
    }

    .card-icon {
      font-size: 1.5rem;
      margin-bottom: 2px;
    }

    .card.temp-card { border-top: 3px solid var(--orange); }
    .card.hum-card  { border-top: 3px solid var(--blue); }

    /* ── Chart ── */
    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 28px;
    }

    .section-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 16px;
    }

    .chart-container {
      position: relative;
      height: 240px;
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead th {
      text-align: left;
      padding: 8px 12px;
      color: var(--muted);
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }

    tbody td {
      padding: 10px 12px;
      color: var(--text);
    }

    .temp-val { color: var(--orange); font-weight: 600; }
    .hum-val  { color: var(--blue);   font-weight: 600; }

    .no-data {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .cards { grid-template-columns: 1fr 1fr; }
      header h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>IoT <span>Monitor</span></h1>
    <div class="status-pill">
      <div class="dot" id="dot"></div>
      <span id="status-text">A ligar...</span>
    </div>
  </header>

  <!-- Cards -->
  <div class="cards">
    <div class="card temp-card">
      <div class="card-icon">🌡️</div>
      <div class="card-label">Temperatura</div>
      <div class="card-value temp" id="card-temp">—</div>
    </div>
    <div class="card hum-card">
      <div class="card-icon">💧</div>
      <div class="card-label">Humidade</div>
      <div class="card-value hum" id="card-hum">—</div>
    </div>
    <div class="card">
      <div class="card-icon">🕐</div>
      <div class="card-label">Última Leitura</div>
      <div class="card-value small" id="card-time">—</div>
    </div>
    <div class="card">
      <div class="card-icon">📡</div>
      <div class="card-label">Dispositivo</div>
      <div class="card-value small" id="card-device">—</div>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-wrap">
    <div class="section-title">Histórico — últimas 20 leituras</div>
    <div class="chart-container">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="section-title">Tabela — últimas 10 leituras</div>
    <table>
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Dispositivo</th>
          <th>Temp (°C)</th>
          <th>Humidade (%)</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="4" class="no-data">Aguardando dados...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const dot        = document.getElementById('dot');
    const statusText = document.getElementById('status-text');
    const cardTemp   = document.getElementById('card-temp');
    const cardHum    = document.getElementById('card-hum');
    const cardTime   = document.getElementById('card-time');
    const cardDevice = document.getElementById('card-device');
    const tableBody  = document.getElementById('table-body');

    // ── Chart setup ──────────────────────────────────────────
    const ctx = document.getElementById('chart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [
          {
            label: 'Temperatura (°C)',
            data: [],
            borderColor: '#f97316',
            backgroundColor: 'rgba(249,115,22,0.08)',
            borderWidth: 2,
            pointRadius: 3,
            pointBackgroundColor: '#f97316',
            tension: 0.3,
            fill: true,
            yAxisID: 'yTemp'
          },
          {
            label: 'Humidade (%)',
            data: [],
            borderColor: '#38bdf8',
            backgroundColor: 'rgba(56,189,248,0.08)',
            borderWidth: 2,
            pointRadius: 3,
            pointBackgroundColor: '#38bdf8',
            tension: 0.3,
            fill: true,
            yAxisID: 'yHum'
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            labels: { color: '#94a3b8', font: { size: 12 } }
          }
        },
        scales: {
          x: {
            ticks: { color: '#64748b', maxTicksLimit: 8, font: { size: 11 } },
            grid:  { color: '#1e2231' }
          },
          yTemp: {
            type: 'linear',
            position: 'left',
            ticks: { color: '#f97316', font: { size: 11 } },
            grid:  { color: '#1e2231' },
            title: { display: true, text: '°C', color: '#f97316', font: { size: 11 } }
          },
          yHum: {
            type: 'linear',
            position: 'right',
            ticks: { color: '#38bdf8', font: { size: 11 } },
            grid:  { drawOnChartArea: false },
            title: { display: true, text: '%', color: '#38bdf8', font: { size: 11 } }
          }
        }
      }
    });

    // ── Helpers ──────────────────────────────────────────────
    function formatTime(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      return d.toLocaleTimeString('pt-MZ', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function setOnline(online) {
      dot.className = 'dot ' + (online ? 'online' : 'offline');
      statusText.textContent = online ? 'Online' : 'Offline';
    }

    // ── Fetch latest (cards) ──────────────────────────────────
    async function fetchLatest() {
      try {
        const res = await fetch('/data/latest');
        if (!res.ok) { setOnline(false); return; }
        const d = await res.json();
        setOnline(true);
        cardTemp.textContent   = d.temperature != null ? d.temperature + ' °C' : '—';
        cardHum.textContent    = d.humidity    != null ? d.humidity    + ' %'  : '—';
        cardTime.textContent   = formatTime(d.timestamp);
        cardDevice.textContent = d.device_id || '—';
      } catch {
        setOnline(false);
      }
    }

    // ── Fetch history (chart + table) ────────────────────────
    async function fetchHistory() {
      try {
        const res = await fetch('/data');
        if (!res.ok) return;
        const all = await res.json();

        // Chart — last 20
        const slice = all.slice(-20);
        chart.data.labels              = slice.map(r => formatTime(r.timestamp));
        chart.data.datasets[0].data   = slice.map(r => r.temperature);
        chart.data.datasets[1].data   = slice.map(r => r.humidity);
        chart.update('none');

        // Table — last 10, newest first
        const rows = all.slice(-10).reverse();
        if (rows.length === 0) {
          tableBody.innerHTML = '<tr><td colspan="4" class="no-data">Sem dados ainda.</td></tr>';
          return;
        }
        tableBody.innerHTML = rows.map(r => `
          <tr>
            <td>${r.timestamp || '—'}</td>
            <td>${r.device_id || '—'}</td>
            <td class="temp-val">${r.temperature != null ? r.temperature : '—'}</td>
            <td class="hum-val">${r.humidity    != null ? r.humidity    : '—'}</td>
          </tr>`).join('');
      } catch { /* silently ignore */ }
    }

    // ── Init + polling ────────────────────────────────────────
    async function refresh() {
      await fetchLatest();
      await fetchHistory();
    }

    refresh();
    setInterval(refresh, 5000);
  </script>

</body>
</html>
